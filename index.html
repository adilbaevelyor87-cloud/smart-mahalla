<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mahalla</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .product-card { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
        .error-msg { color: red; background: #ffdada; padding: 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <h3>🏘 Smart Mahalla</h3>
    <div id="status">Загрузка данных...</div>
    <div id="products-list"></div>

    <script>
        // ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ
        const API_URL = "https://script.google.com/macros/s/AKfycbyZs2A78Ej4jab5IPco57iKeCgAvn6DMD3K-HLY8hqI2uDyYJIR7XjpPUie2i1J97h6MQ/exec";

        async function loadData() {
            const statusDiv = document.getElementById('status');
            const listDiv = document.getElementById('products-list');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Код ошибки: " + response.status);
                
                const products = await response.json();
                
                if (products.length === 0) {
                    statusDiv.innerHTML = "❌ В таблице нет товаров. Добавьте строки в лист products!";
                } else {
                    statusDiv.style.display = 'none';
                    products.forEach(p => {
                        const item = document.createElement('div');
                        item.className = 'product-card';
                        item.innerHTML = `<b>${p.Name || p.name}</b><br>${p.Price || p.price} сум`;
                        listDiv.appendChild(item);
                    });
                }
            } catch (err) {
                statusDiv.innerHTML = `<div class="error-msg">Ошибка связи с таблицей: <br>${err.message}<br><br>Проверьте доступ "Anyone" в настройках деплоя!</div>`;
            }
        }

        loadData();
        Telegram.WebApp.ready();
    </script>
</body>
</html>
