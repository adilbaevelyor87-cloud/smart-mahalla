<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mahalla</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #efeff4; margin: 0; padding: 15px; color: #000; }
        h2 { text-align: center; color: #007aff; }
        .product-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-name { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .description { font-size: 14px; color: #8e8e93; margin-bottom: 10px; }
        .price { font-size: 16px; font-weight: bold; color: #34c759; }
        .btn { background: #007aff; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:active { background: #0051a8; }
        #cart-btn { background: #ff9500; position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; color: white; font-size: 24px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <h2>🏘 Smart Mahalla</h2>
    <div id="products-list">Загрузка товаров...</div>
    <button id="cart-btn" onclick="openCart()">🛒</button>

    <script>
        // !!! ВНИМАНИЕ: ВСТАВЬ СВОЮ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT МЕЖДУ КАВЫЧЕК !!!
        const API_URL = "https://script.google.com/macros/s/AKfycbyZs2A78Ej4jab5IPco57iKeCgAvn6DMD3K-HLY8hqI2uDyYJIR7XjpPUie2i1J97h6MQ/exec";
        
        let cart = [];
        let products = [];

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                products = await response.json();
                const container = document.getElementById('products-list');
                container.innerHTML = '';
                
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-name">${p.Name || p.name}</div>
                        <div class="description">${p.Description || p.description}</div>
                        <div class="price">${p.Price || p.price} сум</div>
                        <button class="btn" onclick="addToCart(${p.ID || p.id})">В корзину</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('products-list').innerHTML = "Ошибка загрузки. Проверьте ссылку API.";
            }
        }

        function addToCart(id) {
            const product = products.find(p => (p.ID || p.id) == id);
            cart.push(product);
            document.getElementById('cart-btn').style.display = 'block';
            if (window.Telegram.WebApp) {
                Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        async function openCart() {
            const name = Telegram.WebApp.initDataUnsafe.user?.first_name || "Клиент";
            const itemsSummary = cart.map(p => p.Name || p.name).join(', ');
            const total = cart.reduce((sum, p) => sum + Number(p.Price || p.price), 0);
            
            Telegram.WebApp.showConfirm(`Оформить заказ на ${total} сум?`, (confirmed) => {
                if (confirmed) {
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            name: name,
                            phone: "Из Telegram",
                            items: itemsSummary,
                            total: total,
                            shopId: cart[0].Shop_ID || cart[0].shop_id
                        })
                    }).then(() => {
                        Telegram.WebApp.showAlert("Заказ отправлен! Продавец скоро свяжется с вами.");
                        cart = [];
                        document.getElementById('cart-btn').style.display = 'none';
                    });
                }
            });
        }

        loadProducts();
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
